name: Lint & Type Check

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'frontend/src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'frontend/package.json'
      - 'frontend/tsconfig*.json'
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
      - 'frontend/src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'frontend/package.json'
      - 'frontend/tsconfig*.json'
  workflow_dispatch:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    name: Python Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check api/ tests/

      - name: Run ruff format check
        run: ruff format --check api/ tests/

  lint-frontend:
    name: TypeScript Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

  lint-complete:
    name: Lint Complete
    runs-on: ubuntu-latest
    needs: [lint-python, lint-frontend]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint-python.result }}" != "success" ]] || \
             [[ "${{ needs.lint-frontend.result }}" != "success" ]]; then
            echo "One or more lint jobs failed"
            exit 1
          fi
          echo "All lint jobs passed"
