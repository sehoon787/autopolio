name: Lint & Type Check

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'frontend/src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'frontend/package.json'
      - 'frontend/tsconfig*.json'
      - '.github/workflows/lint.yml'
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
      - 'frontend/src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'frontend/package.json'
      - 'frontend/tsconfig*.json'
      - '.github/workflows/lint.yml'
  workflow_dispatch:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    name: Python Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python backend
        uses: ./.github/actions/setup-python-backend
        with:
          install-deps: 'false'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check api/ tests/

      - name: Run ruff format check
        run: ruff format --check api/ tests/

  lint-frontend:
    name: TypeScript Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node frontend
        uses: ./.github/actions/setup-node-frontend

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

  lint-complete:
    name: Lint Complete
    runs-on: ubuntu-latest
    needs: [lint-python, lint-frontend]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint-python.result }}" != "success" ]] || \
             [[ "${{ needs.lint-frontend.result }}" != "success" ]]; then
            echo "One or more lint jobs failed"
            exit 1
          fi
          echo "All lint jobs passed"
