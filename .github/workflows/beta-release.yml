name: Beta Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.*'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v1.19.0-beta.1)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: beta-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    name: Build Windows (Beta)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Python backend
        uses: ./.github/actions/setup-python-backend
        with:
          install-deps: 'false'

      - name: Setup Node frontend
        uses: ./.github/actions/setup-node-frontend

      - name: Download bundled Python (Windows)
        working-directory: frontend
        run: npm run python:download:win

      - name: Build Electron (Windows)
        working-directory: frontend
        run: npm run electron:build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Azure Trusted Signing (conditional) ---
      - name: Check Azure credentials
        id: azure-check
        shell: bash
        run: |
          if [ -n "${{ secrets.AZURE_CLIENT_ID }}" ] && \
             [ -n "${{ secrets.AZURE_TENANT_ID }}" ] && \
             [ -n "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]; then
            echo "has-creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-creds=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Azure signing skipped (credentials not configured)"
          fi

      - name: Azure Login (OIDC)
        if: steps.azure-check.outputs.has-creds == 'true'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign with Azure Trusted Signing
        if: steps.azure-check.outputs.has-creds == 'true'
        uses: azure/trusted-signing-action@v1.1.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_SIGNING_PROFILE }}
          files-folder: frontend/release
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: beta-release-windows
          path: frontend/release/*.exe
          retention-days: 7

  build-macos:
    name: Build macOS (Beta)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Python backend
        uses: ./.github/actions/setup-python-backend
        with:
          install-deps: 'false'

      - name: Setup Node frontend
        uses: ./.github/actions/setup-node-frontend

      - name: Download bundled Python (macOS)
        working-directory: frontend
        run: npm run python:download:mac

      # --- Apple code signing (conditional) ---
      - name: Check Apple credentials
        id: apple-check
        run: |
          if [ -n "${{ secrets.APPLE_CERTIFICATE }}" ] && \
             [ -n "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" ]; then
            echo "has-creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-creds=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Apple code signing skipped (credentials not configured)"
          fi

      - name: Import Apple certificate
        if: steps.apple-check.outputs.has-creds == 'true'
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "${{ secrets.APPLE_CERTIFICATE }}" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build Electron (macOS) - unsigned
        if: steps.apple-check.outputs.has-creds != 'true'
        working-directory: frontend
        run: npm run electron:build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Build Electron (macOS) - signed
        if: steps.apple-check.outputs.has-creds == 'true'
        working-directory: frontend
        run: npm run electron:build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # --- Apple notarization (conditional) ---
      - name: Submit for notarization
        if: steps.apple-check.outputs.has-creds == 'true'
        uses: ./.github/actions/submit-macos-notarization
        with:
          artifact-path: frontend/release/*.dmg
          apple-id: ${{ secrets.APPLE_ID }}
          apple-password: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          apple-team-id: ${{ secrets.APPLE_TEAM_ID }}

      - name: Staple notarization
        if: steps.apple-check.outputs.has-creds == 'true'
        uses: ./.github/actions/finalize-macos-notarization
        with:
          artifact-path: frontend/release/*.dmg

      - name: Cleanup keychain
        if: always() && steps.apple-check.outputs.has-creds == 'true'
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: beta-release-macos
          path: frontend/release/*.dmg
          retention-days: 7

  create-beta-release:
    name: Create Beta Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    if: always() && startsWith(github.ref, 'refs/tags/v') && needs.build-windows.result == 'success'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download Windows artifacts
        uses: actions/download-artifact@v8
        with:
          name: beta-release-windows
          path: release-assets/

      - name: Download macOS artifacts
        if: needs.build-macos.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: beta-release-macos
          path: release-assets/

      - name: Generate checksums
        working-directory: release-assets
        run: |
          sha256sum * > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Determine pre-release label
        id: label
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG_NAME" == *"-rc"* ]]; then
            echo "label=Release Candidate" >> "$GITHUB_OUTPUT"
          else
            echo "label=Beta" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Create pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.label.outputs.tag }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists, uploading assets..."
            gh release upload "$TAG" release-assets/* --clobber
          else
            gh release create "$TAG" \
              --title "Autopolio $TAG (${{ steps.label.outputs.label }})" \
              --prerelease \
              --generate-notes \
              release-assets/*
          fi
