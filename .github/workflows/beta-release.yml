name: Beta Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.*'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v1.19.0-beta.1)'
        required: true
        type: string

concurrency:
  group: beta-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    name: Build Windows (Beta)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Download bundled Python (Windows)
        working-directory: frontend
        run: npm run python:download:win

      - name: Build Electron (Windows)
        working-directory: frontend
        run: npm run electron:build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: beta-release-windows
          path: frontend/release/*.exe
          retention-days: 7

  build-macos:
    name: Build macOS (Beta)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Download bundled Python (macOS)
        working-directory: frontend
        run: npm run python:download:mac

      - name: Build Electron (macOS)
        working-directory: frontend
        run: npm run electron:build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: beta-release-macos
          path: frontend/release/*.dmg
          retention-days: 7

  create-beta-release:
    name: Create Beta Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: beta-release-windows
          path: release-assets/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: beta-release-macos
          path: release-assets/

      - name: Generate checksums
        working-directory: release-assets
        run: |
          sha256sum * > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Determine pre-release label
        id: label
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG_NAME" == *"-rc"* ]]; then
            echo "label=Release Candidate" >> "$GITHUB_OUTPUT"
          else
            echo "label=Beta" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Create pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.label.outputs.tag }}" \
            --title "Autopolio ${{ steps.label.outputs.tag }} (${{ steps.label.outputs.label }})" \
            --prerelease \
            --generate-notes \
            release-assets/*
