name: PR Labeler

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  file-labeler:
    name: File-path Labels
    runs-on: ubuntu-latest

    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

  smart-labeler:
    name: Smart Labels
    runs-on: ubuntu-latest

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title;
            const body = pr.body || '';
            const labelsToAdd = [];

            // Helper: ensure label exists, create if missing
            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name,
                    color,
                    description,
                  });
                }
              }
            }

            // --- Conventional Commit parsing ---
            const commitMap = {
              'feat': { label: 'feature', color: '0E8A16', desc: 'New feature' },
              'fix': { label: 'fix', color: 'D93F0B', desc: 'Bug fix' },
              'docs': { label: 'documentation', color: '0075CA', desc: 'Documentation' },
              'refactor': { label: 'refactor', color: 'FBCA04', desc: 'Code refactoring' },
              'test': { label: 'test', color: '1D76DB', desc: 'Tests' },
              'chore': { label: 'chore', color: 'BFD4F2', desc: 'Maintenance' },
              'perf': { label: 'performance', color: 'F9D0C4', desc: 'Performance' },
              'ci': { label: 'ci', color: 'C5DEF5', desc: 'CI/CD' },
              'style': { label: 'style', color: 'FEF2C0', desc: 'Code style' },
              'build': { label: 'build', color: 'E4E669', desc: 'Build system' },
            };

            const conventionalMatch = title.match(/^(\w+)(!)?(\(.+\))?:\s/);
            if (conventionalMatch) {
              const type = conventionalMatch[1];
              const breaking = conventionalMatch[2] === '!';
              const mapping = commitMap[type];
              if (mapping) {
                await ensureLabel(mapping.label, mapping.color, mapping.desc);
                labelsToAdd.push(mapping.label);
              }
              if (breaking) {
                await ensureLabel('breaking', 'B60205', 'Breaking change');
                labelsToAdd.push('breaking');
              }
            }

            // --- Breaking change detection in body ---
            if (/breaking\s*change/i.test(body)) {
              await ensureLabel('breaking', 'B60205', 'Breaking change');
              if (!labelsToAdd.includes('breaking')) {
                labelsToAdd.push('breaking');
              }
            }

            // --- Size labels ---
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const totalChanges = files.reduce((sum, f) => sum + f.changes, 0);

            const sizeLabels = [
              { max: 10, label: 'size/XS', color: '3CBF00' },
              { max: 50, label: 'size/S', color: '5D9801' },
              { max: 200, label: 'size/M', color: 'FBCA04' },
              { max: 500, label: 'size/L', color: 'DB6D00' },
              { max: Infinity, label: 'size/XL', color: 'B60205' },
            ];

            const sizeEntry = sizeLabels.find(s => totalChanges <= s.max);
            await ensureLabel(sizeEntry.label, sizeEntry.color, `PR size: ${sizeEntry.label.split('/')[1]}`);
            labelsToAdd.push(sizeEntry.label);

            // Remove previous size labels
            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
            });
            for (const lbl of currentLabels) {
              if (lbl.name.startsWith('size/') && lbl.name !== sizeEntry.label) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  name: lbl.name,
                }).catch(() => {});
              }
            }

            // --- Apply labels ---
            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: labelsToAdd,
              });
              core.info(`Added labels: ${labelsToAdd.join(', ')}`);
            }
