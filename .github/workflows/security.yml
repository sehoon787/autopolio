name: Security Scan

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/labeler.yml'
      - '.github/WORKFLOWS.md'
      - 'LICENSE'
      - 'CHANGELOG.md'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/labeler.yml'
      - '.github/WORKFLOWS.md'
      - 'LICENSE'
      - 'CHANGELOG.md'
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 6:00 UTC
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bandit:
    name: Python Security (Bandit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python backend
        uses: ./.github/actions/setup-python-backend
        with:
          install-deps: 'false'

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit security scan
        run: bandit -r api/ -f json -o bandit-report.json --severity-level medium || true

      - name: Display Bandit results
        if: always()
        run: |
          if [ -f bandit-report.json ]; then
            python -c "
          import json
          with open('bandit-report.json') as f:
              report = json.load(f)
          results = report.get('results', [])
          if results:
              print(f'Found {len(results)} issue(s):')
              for r in results:
                  print(f\"  [{r['issue_severity']}] {r['issue_text']} ({r['filename']}:{r['line_number']})\")
          else:
              print('No security issues found.')
          metrics = report.get('metrics', {}).get('_totals', {})
          print(f\"Scanned {metrics.get('loc', 'N/A')} lines of code.\")
          "
          fi

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  security-complete:
    name: Security Complete
    runs-on: ubuntu-latest
    needs: [bandit]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Bandit: ${{ needs.bandit.result }}"

          if [[ "${{ needs.bandit.result }}" != "success" ]]; then
            echo "Bandit security scan failed"
            exit 1
          fi

          echo "Security scans completed"
