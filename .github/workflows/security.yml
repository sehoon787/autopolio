name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 6:00 UTC

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'

  bandit:
    name: Python Security (Bandit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit security scan
        run: bandit -r api/ -f json -o bandit-report.json --severity-level medium || true

      - name: Display Bandit results
        if: always()
        run: |
          if [ -f bandit-report.json ]; then
            python -c "
          import json
          with open('bandit-report.json') as f:
              report = json.load(f)
          results = report.get('results', [])
          if results:
              print(f'Found {len(results)} issue(s):')
              for r in results:
                  print(f\"  [{r['issue_severity']}] {r['issue_text']} ({r['filename']}:{r['line_number']})\")
          else:
              print('No security issues found.')
          metrics = report.get('metrics', {}).get('_totals', {})
          print(f\"Scanned {metrics.get('loc', 'N/A')} lines of code.\")
          "
          fi

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  security-complete:
    name: Security Complete
    runs-on: ubuntu-latest
    needs: [codeql, bandit]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.codeql.result }}" != "success" ]] || \
             [[ "${{ needs.bandit.result }}" != "success" ]]; then
            echo "One or more security jobs failed"
            exit 1
          fi
          echo "All security scans passed"
