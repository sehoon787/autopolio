name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/labeler.yml'
      - '.github/WORKFLOWS.md'
      - 'LICENSE'
      - 'CHANGELOG.md'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Gemini Code Review
    runs-on: ubuntu-latest

    steps:
      - name: Check API key
        id: check-key
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY not configured. Skipping AI review."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Get PR diff
        if: steps.check-key.outputs.skip != 'true'
        id: diff
        uses: actions/github-script@v7
        with:
          script: |
            // Paginate to handle PRs with >100 changed files
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            // Filter out non-reviewable files
            const SKIP_PATTERNS = [
              /package-lock\.json$/,
              /pnpm-lock\.yaml$/,
              /yarn\.lock$/,
              /\.lock$/,
              /node_modules\//,
              /dist\//,
              /\.min\.js$/,
              /\.min\.css$/,
              /\.map$/,
              /\.generated\./,
              /\.snap$/,
              /__pycache__\//,
              /\.pyc$/,
            ];

            const reviewable = files.filter(f => {
              if (!f.patch) return false;
              return !SKIP_PATTERNS.some(p => p.test(f.filename));
            });

            if (reviewable.length === 0) {
              core.info('No reviewable file changes found.');
              core.setOutput('has_diff', 'false');
              return;
            }

            // Build diff string with 200KB limit
            const MAX_BYTES = 200 * 1024;
            let diff = '';
            let truncated = false;

            for (const file of reviewable) {
              const entry = `\n--- ${file.filename} (${file.status})\n${file.patch}\n`;
              if (Buffer.byteLength(diff + entry, 'utf8') > MAX_BYTES) {
                truncated = true;
                break;
              }
              diff += entry;
            }

            if (truncated) {
              diff += '\n[... diff truncated due to size limit ...]\n';
            }

            core.setOutput('has_diff', 'true');
            core.setOutput('diff', diff);
            core.setOutput('file_count', String(reviewable.length));

      - name: Call Gemini API
        if: steps.check-key.outputs.skip != 'true' && steps.diff.outputs.has_diff == 'true'
        id: review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_DIFF: ${{ steps.diff.outputs.diff }}
          FILE_COUNT: ${{ steps.diff.outputs.file_count }}
        run: |
          # Build the prompt
          PROMPT=$(cat <<'PROMPT_END'
          You are a senior software engineer reviewing a pull request.
          Project: Autopolio - a portfolio/resume automation platform (FastAPI + React/TypeScript + Electron).
          Review the diff below for:
          1. Logic errors, edge cases, potential bugs
          2. Security vulnerabilities (injection, XSS, credential exposure, hardcoded secrets)
          3. Performance issues (N+1 queries, unnecessary re-renders, missing indexes)
          4. Code quality and maintainability
          Rules:
          - Only comment on actual issues, not style preferences
          - Be concise and actionable - suggest fixes, not just problems
          - If no issues found, say so briefly
          - Use markdown formatting
          - Categorize issues by severity: CRITICAL / HIGH / MEDIUM / LOW
          - Keep the review under 2000 words
          Output format:
          ## Summary
          (1-2 sentence overview)
          ## Issues Found
          (list each issue with severity badge, file, and suggestion)
          (if none: "No issues found.")
          ## Positive Aspects
          (brief list of good practices observed, if any)
          PROMPT_END
          )

          # Build JSON payload
          PAYLOAD=$(jq -n \
            --arg prompt "$PROMPT" \
            --arg title "$PR_TITLE" \
            --arg body "${PR_BODY:-(no description)}" \
            --arg diff "$PR_DIFF" \
            --arg files "$FILE_COUNT" \
            '{
              "system_instruction": {
                "parts": [{"text": $prompt}]
              },
              "contents": [{
                "parts": [{
                  "text": ("PR: " + $title + "\nDescription: " + $body + "\nFiles changed: " + $files + "\n\nDiff:\n```\n" + $diff + "\n```")
                }]
              }],
              "generationConfig": {
                "temperature": 0.3,
                "maxOutputTokens": 4096
              }
            }') || {
            echo "Failed to build JSON payload"
            echo "review_body=Failed to build request payload. Review skipped." >> "$GITHUB_OUTPUT"
            exit 0
          }

          # Call Gemini API (header auth to avoid key in URL/logs)
          HTTP_CODE=$(curl -s -w "%{http_code}" -o response.json \
            --max-time 120 --connect-timeout 10 \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent" \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: ${GEMINI_API_KEY}" \
            -d "$PAYLOAD")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Gemini API returned HTTP $HTTP_CODE"
            jq '{error: .error.message, status: .error.status}' response.json 2>/dev/null || echo "(could not parse error)"
            echo "review_body=API call failed (HTTP $HTTP_CODE). Review skipped." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract review text directly to file (avoids shell escaping issues)
          jq -r '.candidates[0].content.parts[0].text // "No response generated."' response.json > review.md

          # Set multiline output with random delimiter to prevent collision
          DELIMITER="REVIEW_EOF_$(openssl rand -hex 8)"
          {
            echo "review_body<<${DELIMITER}"
            cat review.md
            echo "${DELIMITER}"
          } >> "$GITHUB_OUTPUT"

      - name: Post or update review comment
        if: steps.check-key.outputs.skip != 'true' && steps.diff.outputs.has_diff == 'true'
        uses: actions/github-script@v7
        env:
          REVIEW_BODY: ${{ steps.review.outputs.review_body }}
        with:
          script: |
            const marker = '<!-- ai-review-bot -->';
            const body = `${marker}\n# AI Code Review (Gemini)\n\n${process.env.REVIEW_BODY}\n\n---\n*Reviewed by Gemini 2.0 Flash at ${new Date().toISOString()}*`;

            // Find existing bot comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing review comment #${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
              core.info('Created new review comment');
            }

      - name: Post skip comment (no reviewable changes)
        if: steps.check-key.outputs.skip != 'true' && steps.diff.outputs.has_diff == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- ai-review-bot -->';
            const body = `${marker}\n# AI Code Review (Gemini)\n\nNo reviewable code changes found (lock files, generated files, and binaries are excluded).\n\n---\n*Checked at ${new Date().toISOString()}*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
