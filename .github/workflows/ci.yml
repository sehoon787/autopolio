name: CI Tests

on:
  push:
    paths:
      - 'api/**'
      - 'frontend/src/**'
      - 'tests/**'
      - 'config/**'
      - 'docker-compose.yml'
      - 'Dockerfile.api'
      - 'frontend/Dockerfile'
      - 'pyproject.toml'
      - 'frontend/package.json'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'api/**'
      - 'frontend/src/**'
      - 'tests/**'
      - 'config/**'
      - 'docker-compose.yml'
      - 'Dockerfile.api'
      - 'frontend/Dockerfile'
      - 'pyproject.toml'
      - 'frontend/package.json'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-api-sqlite:
    name: API Tests (SQLite)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python backend
        uses: ./.github/actions/setup-python-backend

      - name: Create data directories
        run: mkdir -p data result

      - name: Generate encryption key for tests
        run: |
          echo "ENCRYPTION_KEY=$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> $GITHUB_ENV

      - name: Run API tests (SQLite)
        run: uv run pytest tests/api/ -m "not requires_github and not slow" --tb=short -q
        env:
          CI: true
          ENCRYPTION_KEY: ${{ env.ENCRYPTION_KEY }}
          DATABASE_URL: sqlite+aiosqlite:///./data/test_ci.db
          LLM_PROVIDER: openai
          OPENAI_API_KEY: sk-test-dummy-key
          GITHUB_CLIENT_ID: test-client-id
          GITHUB_CLIENT_SECRET: test-client-secret

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-test-results-sqlite
          path: |
            tests/test-results/
          retention-days: 7

  test-api-postgresql:
    name: API Tests (PostgreSQL)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: test_autopolio
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python backend
        uses: ./.github/actions/setup-python-backend

      - name: Create data directories
        run: mkdir -p data result

      - name: Generate encryption key for tests
        run: |
          echo "ENCRYPTION_KEY=$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> $GITHUB_ENV

      - name: Run API tests (PostgreSQL)
        run: uv run pytest tests/api/ -m "not requires_github and not slow" --tb=short -q
        env:
          CI: true
          ENCRYPTION_KEY: ${{ env.ENCRYPTION_KEY }}
          DATABASE_URL: postgresql+asyncpg://testuser:testpass@localhost:5432/test_autopolio
          TEST_POSTGRESQL_URL: postgresql+asyncpg://testuser:testpass@localhost:5432/test_autopolio
          LLM_PROVIDER: openai
          OPENAI_API_KEY: sk-test-dummy-key
          GITHUB_CLIENT_ID: test-client-id
          GITHUB_CLIENT_SECRET: test-client-secret

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-test-results-postgresql
          path: |
            tests/test-results/
          retention-days: 7

  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6

      - name: Generate encryption key
        run: |
          if [ -z "$ENCRYPTION_KEY_INPUT" ]; then
            echo "ENCRYPTION_KEY=$(python3 -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> $GITHUB_ENV
          else
            echo "ENCRYPTION_KEY=$ENCRYPTION_KEY_INPUT" >> $GITHUB_ENV
          fi
        env:
          ENCRYPTION_KEY_INPUT: ${{ secrets.ENCRYPTION_KEY }}

      - name: Create .env for Docker
        run: |
          cat > .env << 'ENVFILE'
          DATABASE_URL=sqlite+aiosqlite:///./data/autopolio.db
          LLM_PROVIDER=openai
          OPENAI_API_KEY=sk-test-dummy-key
          GITHUB_CLIENT_ID=test-client-id
          GITHUB_CLIENT_SECRET=test-client-secret
          DEBUG=true
          ENVFILE
          echo "ENCRYPTION_KEY=${{ env.ENCRYPTION_KEY }}" >> .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: docker-${{ runner.os }}-${{ hashFiles('Dockerfile.api', 'frontend/Dockerfile', 'pyproject.toml', 'uv.lock', 'frontend/package-lock.json') }}
          restore-keys: docker-${{ runner.os }}-

      - name: Build and start Docker containers
        run: docker compose up -d --build

      - name: Wait for API to be ready
        run: |
          echo "Waiting for API..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8085/health > /dev/null 2>&1; then
              echo "API is ready!"
              exit 0
            fi
            echo "Attempt $i/20..."
            sleep 5
          done
          echo "ERROR: API did not start within 100 seconds"
          docker compose logs api --tail=50
          exit 1

      - name: Wait for Frontend to be ready
        run: |
          echo "Waiting for Frontend..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3035/ > /dev/null 2>&1; then
              echo "Frontend is ready!"
              exit 0
            fi
            echo "Attempt $i/20..."
            sleep 5
          done
          echo "ERROR: Frontend did not start within 100 seconds"
          docker compose logs frontend --tail=50
          exit 1

      - name: Wait for services to stabilize
        run: |
          echo "Waiting 10s for services to fully stabilize..."
          sleep 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install E2E test dependencies
        working-directory: tests/e2e
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/e2e/package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: tests/e2e
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: tests/e2e
        run: npx playwright install-deps chromium

      - name: Run E2E tests
        working-directory: tests/e2e
        run: npx playwright test
        env:
          CI: true
          FRONTEND_URL: http://localhost:3035
          API_BASE_URL: http://localhost:8085/api

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: tests/e2e/test-results/
          retention-days: 7

      - name: Show Docker logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Stop Docker containers
        if: always()
        run: docker compose down

  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    needs: [test-api-sqlite, test-api-postgresql, test-e2e]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "API Tests (SQLite): ${{ needs.test-api-sqlite.result }}"
          echo "API Tests (PostgreSQL): ${{ needs.test-api-postgresql.result }}"
          echo "E2E Tests: ${{ needs.test-e2e.result }}"
          if [[ "${{ needs.test-api-sqlite.result }}" != "success" ]]; then
            echo "SQLite API tests failed — blocking"
            exit 1
          fi
          if [[ "${{ needs.test-api-postgresql.result }}" != "success" ]]; then
            echo "PostgreSQL API tests failed — blocking"
            exit 1
          fi
          if [[ "${{ needs.test-e2e.result }}" == "failure" ]]; then
            echo "WARNING: E2E tests failed (non-blocking, continue-on-error)"
          fi
          echo "CI gate passed (both SQLite and PostgreSQL API tests successful)"
