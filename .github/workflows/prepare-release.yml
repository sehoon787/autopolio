name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      custom_version:
        description: 'Custom version (overrides bump type, e.g., 1.19.0)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    name: Prepare Release PR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Calculate new version
        id: version
        run: |
          if [ -n "${{ inputs.custom_version }}" ]; then
            NEW_VERSION="${{ inputs.custom_version }}"
          else
            # Read current version from package.json
            CURRENT=$(node -p "require('./frontend/package.json').version")
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

            case "${{ inputs.version }}" in
              major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
              minor) NEW_VERSION="$MAJOR.$((MINOR + 1)).0" ;;
              patch) NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))" ;;
            esac
          fi

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

      - name: Update package.json version
        run: |
          cd frontend
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Update pyproject.toml version
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml

      - name: Generate changelog entry
        id: changelog
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          DATE=$(date +'%Y-%m-%d')

          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi

          ENTRY="## v${NEW_VERSION} (${DATE})

          ${LOG}
          "

          # Prepend to CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            echo "$ENTRY" | cat - CHANGELOG.md > changelog_temp
            mv changelog_temp CHANGELOG.md
          else
            echo "# Changelog

          $ENTRY" > CHANGELOG.md
          fi

      - name: Create release branch and PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          BRANCH="release/v${NEW_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: prepare release v${NEW_VERSION}"
          git push origin "$BRANCH"

          gh pr create \
            --title "Release v${NEW_VERSION}" \
            --body "$(cat <<EOF
          ## Release v${NEW_VERSION}

          ### Changes
          - Version bumped to ${NEW_VERSION}
          - CHANGELOG.md updated

          ### Post-merge steps
          1. Merge this PR
          2. Create and push tag: \`git tag v${NEW_VERSION} && git push origin v${NEW_VERSION}\`
          3. The Release workflow will automatically build and publish

          ---
          *Auto-generated by prepare-release workflow*
          EOF
          )" \
            --base main \
            --head "$BRANCH" \
            --label "release"
