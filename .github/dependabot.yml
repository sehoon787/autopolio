version: 2

updates:
  # Python (pip) - root
  # Security-only: normal version bumps disabled (open-pull-requests-limit: 0).
  # Dependabot Security Updates still create PRs for known CVEs.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - python

  # npm - frontend
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - frontend

  # npm - e2e tests
  - package-ecosystem: npm
    directory: /tests/e2e
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - tests

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - ci
