services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=autopolio
      - POSTGRES_PASSWORD=autopolio
      - POSTGRES_DB=autopolio
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autopolio"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8085:8000"
    volumes:
      - ./data:/app/data
      - ./result:/app/result
      - ./config:/app/config
      - ./.env:/app/.env.init:ro
      # Mount host CLI auth dirs (rw so CLI login/logout can save credentials)
      - ~/.claude:/root/.claude
      - ~/.gemini:/root/.gemini
      - ~/.codex:/root/.codex
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://autopolio:autopolio@db:5432/autopolio
      - ENABLE_MIGRATIONS=true
      - TZ=Asia/Seoul
      - AUTOPOLIO_RUNTIME=docker
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3035:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
