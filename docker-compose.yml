services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8085:8000"
    volumes:
      - ./data:/app/data
      - ./result:/app/result
      - ./config:/app/config
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/autopolio.db
      - TZ=Asia/Seoul
      - AUTOPOLIO_RUNTIME=docker
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3035:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  data:
  result:
